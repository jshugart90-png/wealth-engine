<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Color Switch Snake — Wealth Engine Games</title>
<meta name="description" content="Guide the snake through matching color gates! Simple arcade game for all ages.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0c;color:#fff;font-family:system-ui,sans-serif;overflow:hidden;touch-action:none;user-select:none}
#wrap{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px}
h1{font-size:1.15rem;margin:4px 0}
.sub{font-size:.72rem;color:#888;text-align:center;margin-bottom:4px}
#hud{font-size:.85rem;margin-bottom:4px}
#hud span{color:#f472b6;font-weight:700}
canvas{border-radius:10px;background:#111;max-width:100%;touch-action:none}
#msg{font-size:.82rem;color:#888;margin:4px;min-height:1.2em}
.btn{background:#ec4899;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:600;cursor:pointer;margin:4px}
.ad{width:100%;max-width:320px;background:#111;border:1px dashed #333;border-radius:6px;padding:8px;text-align:center;font-size:10px;color:#555;margin:6px 0}
.cta{font-size:11px;color:#888;text-align:center;margin-top:4px}
.cta a{color:#f472b6;text-decoration:none}
</style>
</head>
<body>
<div id="wrap">
<h1>🐍 Color Switch Snake</h1>
<p class="sub">Swipe or tap sides to turn — match gate colors!</p>
<div id="hud">Score: <span id="score">0</span> · Best: <span id="best">0</span></div>
<canvas id="c" width="360" height="480"></canvas>
<p id="msg">Tap left/right to turn the snake</p>
<button class="btn" id="restart" style="display:none">Play Again</button>
<div class="ad">AdSense placeholder — 320×50</div>
<p class="cta">More free fun at <a href="/games/">Wealth Engine Games</a></p>
</div>
<script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=360,H=480,CS=12;
const COLORS=['#ef4444','#3b82f6','#22c55e','#eab308'];
const names=['red','blue','green','yellow'];
let snake=[],dir={x:1,y:0},nextDir={x:1,y:0},colorIdx=0,score=0,best=+localStorage.getItem('cssBest')||0;
let gates=[],food=null,gameOver=false,tick=0,speed=8;
document.getElementById('best').textContent=best;

function reset(){
  snake=[{x:6,y:20},{x:5,y:20},{x:4,y:20}];
  dir={x:1,y:0};nextDir={x:1,y:0};colorIdx=0;score=0;tick=0;gameOver=false;gates=[];food=null;
  document.getElementById('score').textContent=0;
  document.getElementById('restart').style.display='none';
  document.getElementById('msg').textContent='Tap left/right to turn';
  spawnGate();spawnFood();
}

function spawnGate(){
  const ci=Math.random()*4|0;
  gates.push({x:W/2+(Math.random()*80-40)|0,y:-20,w:60+Math.random()*40|0,h:14,color:COLORS[ci],ci,gapX:30+Math.random()*(W-80)|0,gapW:50});
}

function spawnFood(){
  food={x:(Math.random()*(W/CS-2)|0)+1,y:(Math.random()*(H/CS-4)|0)+2,color:COLORS[Math.random()*4|0]};
}

function turn(left){
  if(gameOver)return;
  const d=dir;
  if(left){if(d.x===1)nextDir={x:0,y:-1};else if(d.x===-1)nextDir={x:0,y:1};else if(d.y===1)nextDir={x:1,y:0};else nextDir={x:-1,y:0};}
  else{if(d.x===1)nextDir={x:0,y:1};else if(d.x===-1)nextDir={x:0,y:-1};else if(d.y===1)nextDir={x:-1,y:0};else nextDir={x:1,y:0};}
}

function die(msg){
  gameOver=true;
  if(score>best){best=score;localStorage.setItem('cssBest',best);document.getElementById('best').textContent=best;}
  document.getElementById('msg').textContent=msg+' Score: '+score;
  document.getElementById('restart').style.display='inline-block';
}

function update(){
  if(gameOver)return;
  tick++;
  if(tick%speed!==0)return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=W/CS||head.y>=H/CS){die('💥 Wall hit!');return;}
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){die('💥 Bit yourself!');return;}
  snake.unshift(head);
  // food
  if(food&&head.x===food.x&&head.y===food.y){
    score+=15;colorIdx=COLORS.indexOf(food.color);
    document.getElementById('score').textContent=score;spawnFood();
  }else snake.pop();
  // gates
  gates.forEach((g,i)=>{
    g.y+=3;
    const hx=head.x*CS+CS/2,hy=head.y*CS+CS/2;
    if(g.y>0&&g.y<H&&Math.abs(hy-g.y)<CS){
      const inGap=hx>g.gapX&&hx<g.gapX+g.gapW;
      if(!inGap&&g.color!==COLORS[colorIdx]){die('Wrong color gate!');return;}
      if(inGap&&g.y>H-40){score+=25;document.getElementById('score').textContent=score;gates.splice(i,1);spawnGate();}
    }
    if(g.y>H+30)gates.splice(i,1);
  });
  if(tick%60===0)spawnGate();
}

function draw(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  gates.forEach(g=>{
    ctx.fillStyle=g.color;
    ctx.fillRect(0,g.y,g.gapX,g.h);
    ctx.fillRect(g.gapX+g.gapW,g.y,W-g.gapX-g.gapW,g.h);
  });
  if(food){ctx.fillStyle=food.color;ctx.beginPath();ctx.arc(food.x*CS+CS/2,food.y*CS+CS/2,CS/2-1,0,Math.PI*2);ctx.fill();}
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?COLORS[colorIdx]:COLORS[colorIdx]+'99';
    ctx.fillRect(s.x*CS+1,s.y*CS+1,CS-2,CS-2);
  });
  ctx.fillStyle='#fff';ctx.font='11px system-ui';ctx.fillText('Snake: '+names[colorIdx],8,H-8);
}

function loop(){update();draw();requestAnimationFrame(loop);}
reset();loop();

function tap(e){
  e.preventDefault();const r=c.getBoundingClientRect();
  const x=(e.clientX||e.touches[0].clientX)-r.left;
  turn(x<r.width/2);
}
c.addEventListener('click',tap);
c.addEventListener('touchstart',tap,{passive:false});
document.getElementById('restart').onclick=reset;
})();
</script>
</body>
</html>
