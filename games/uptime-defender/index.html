<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Uptime Defender — Wealth Engine Games</title>
<meta name="description" content="Defend your servers from downtime bugs! Simple tower defense for all ages.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a12;color:#e0e0ff;font-family:system-ui,sans-serif;overflow:hidden;touch-action:none;user-select:none}
#wrap{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px}
h1{font-size:1.15rem;margin:4px 0;text-align:center}
.sub{font-size:.72rem;color:#8888bb;text-align:center;margin-bottom:4px}
#hud{display:flex;gap:12px;font-size:.8rem;flex-wrap:wrap;justify-content:center;margin-bottom:4px}
#hud span{color:#6ee7b7;font-weight:700}
canvas{border-radius:10px;background:#12121f;max-width:100%;touch-action:none}
#msg{font-size:.82rem;color:#8888bb;margin:4px;min-height:1.2em;text-align:center}
.btn{background:#6366f1;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:600;cursor:pointer;margin:4px}
.ad{width:100%;max-width:320px;background:#12121f;border:1px dashed #333;border-radius:6px;padding:8px;text-align:center;font-size:10px;color:#555;margin:6px 0}
.cta{font-size:11px;color:#8888bb;text-align:center;margin-top:4px}
.cta a{color:#818cf8;text-decoration:none}
</style>
</head>
<body>
<div id="wrap">
<h1>🛡️ Uptime Defender</h1>
<p class="sub">Tap lanes to deploy ping monitors — stop downtime bugs!</p>
<div id="hud">Uptime: <span id="uptime">100</span>% · Wave: <span id="wave">1</span> · Credits: <span id="credits">50</span></div>
<canvas id="c" width="400" height="480"></canvas>
<p id="msg">Tap a lane to place a monitor ($25)</p>
<button class="btn" id="restart" style="display:none">Defend Again</button>
<div class="ad">AdSense placeholder — 320×50</div>
<p class="cta">Real uptime alerts? <a href="/go/uptime.html">StatusPing</a> — $5/mo monitors</p>
</div>
<script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=400,H=480,LANES=3,laneW=W/LANES;
let uptime=100,wave=1,credits=50,score=0,towers=[],enemies=[],bullets=[],spawnT=0,gameOver=false,serverX=W/2,serverY=H-40;

function reset(){
  uptime=100;wave=1;credits=50;towers=[];enemies=[];bullets=[];spawnT=0;gameOver=false;
  upd();document.getElementById('restart').style.display='none';
  document.getElementById('msg').textContent='Tap a lane to place a monitor ($25)';
}

function upd(){
  document.getElementById('uptime').textContent=Math.max(0,uptime|0);
  document.getElementById('wave').textContent=wave;
  document.getElementById('credits').textContent=credits|0;
}

function placeTower(lane){
  if(gameOver||credits<25)return;
  if(towers.some(t=>t.lane===lane))return;
  credits-=25;towers.push({lane,cooldown:0,range:120});
  upd();document.getElementById('msg').textContent='Monitor deployed in lane '+(lane+1);
}

function spawnEnemy(){
  const lane=Math.random()*LANES|0;
  const hp=8+wave*3;
  enemies.push({lane,x:lane*laneW+laneW/2,y:-20,hp,maxHp:hp,speed:0.6+wave*0.15});
}

function shoot(t,e){
  bullets.push({x:t.lane*laneW+laneW/2,y:H-100,vx:(e.x-(t.lane*laneW+laneW/2))*0.08,vy:-4,dmg:4+wave});
}

function endGame(){
  gameOver=true;
  document.getElementById('msg').textContent='💀 Downtime! Survived '+wave+' waves. Uptime: '+Math.max(0,uptime|0)+'%';
  document.getElementById('restart').style.display='inline-block';
}

function update(){
  if(gameOver)return;
  spawnT++;
  if(spawnT>Math.max(40,80-wave*5)){spawnT=0;spawnEnemy();}
  if(enemies.length===0&&spawnT%120===0){wave++;credits+=30;upd();document.getElementById('msg').textContent='Wave '+wave+'! +30 credits';}
  towers.forEach(t=>{t.cooldown=Math.max(0,t.cooldown-1);});
  enemies.forEach((e,i)=>{
    e.y+=e.speed;
    if(e.y>H-60){uptime-=5;enemies.splice(i,1);upd();if(uptime<=0)endGame();return;}
    towers.forEach(t=>{
      if(t.lane===e.lane&&t.cooldown===0&&e.y<H-120){
        shoot(t,e);t.cooldown=25;
      }
    });
  });
  bullets.forEach((b,i)=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.y<0){bullets.splice(i,1);return;}
    enemies.forEach((e,j)=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<22){
        e.hp-=b.dmg;bullets.splice(i,1);
        if(e.hp<=0){enemies.splice(j,1);credits+=10;score+=1;upd();}
      }
    });
  });
}

function draw(){
  ctx.fillStyle='#12121f';ctx.fillRect(0,0,W,H);
  // lanes
  for(let i=0;i<LANES;i++){
    ctx.strokeStyle='#1e1e30';ctx.beginPath();ctx.moveTo(i*laneW,0);ctx.lineTo(i*laneW,H);ctx.stroke();
    ctx.fillStyle='rgba(99,102,241,.06)';ctx.fillRect(i*laneW+2,0,laneW-4,H);
  }
  // server
  ctx.fillStyle='#22c55e';ctx.fillRect(serverX-30,serverY-20,60,40);
  ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.fillText('SERVER',serverX-22,serverY+5);
  // towers
  towers.forEach(t=>{
    const x=t.lane*laneW+laneW/2,y=H-90;
    ctx.fillStyle='#6366f1';ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='14px system-ui';ctx.fillText('📡',x-8,y+5);
  });
  // enemies (bugs)
  enemies.forEach(e=>{
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(e.x,e.y,16,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='12px system-ui';ctx.fillText('🐛',e.x-7,e.y+4);
    ctx.fillStyle='#333';ctx.fillRect(e.x-14,e.y-24,28,4);
    ctx.fillStyle='#ef4444';ctx.fillRect(e.x-14,e.y-24,28*(e.hp/e.maxHp),4);
  });
  // bullets (pings)
  bullets.forEach(b=>{
    ctx.fillStyle='#6ee7b7';ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();
  });
}

function loop(){update();draw();requestAnimationFrame(loop);}
reset();loop();

function tap(e){
  e.preventDefault();if(gameOver)return;
  const r=c.getBoundingClientRect();
  const x=(e.clientX||e.touches[0].clientX)-r.left;
  const lane=Math.min(LANES-1,Math.max(0,(x/r.width*LANES)|0));
  placeTower(lane);
}
c.addEventListener('click',tap);
c.addEventListener('touchstart',tap,{passive:false});
document.getElementById('restart').onclick=reset;
})();
</script>
</body>
</html>
