<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Word Scramble: Business Terms — Wealth Engine Games</title>
<meta name="description" content="Unscramble business words! Fun word puzzle for all ages with freelancer vocabulary.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fefce8;color:#1c1917;font-family:system-ui,sans-serif;min-height:100vh;padding:16px;touch-action:manipulation;user-select:none}
h1{font-size:1.15rem;text-align:center;margin-bottom:4px}
.sub{font-size:.72rem;color:#78716c;text-align:center;margin-bottom:12px}
#hud{display:flex;justify-content:center;gap:16px;font-size:.85rem;margin-bottom:12px}
#hud span{color:#ca8a04;font-weight:700}
#scramble{font-size:1.8rem;font-weight:800;text-align:center;letter-spacing:6px;color:#b45309;margin:16px 0;min-height:2.5rem}
#hint{font-size:.8rem;color:#78716c;text-align:center;margin-bottom:12px;font-style:italic}
#letters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:340px;margin:0 auto 16px}
.letter{width:44px;height:44px;background:#fff;border:2px solid #d6d3d1;border-radius:8px;font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.letter:hover{border-color:#ca8a04}
.letter.used{opacity:.3;pointer-events:none}
#answer{display:flex;gap:6px;justify-content:center;margin-bottom:16px;min-height:48px}
.slot{width:40px;height:40px;border:2px dashed #d6d3d1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;background:#fff}
#msg{text-align:center;font-size:.85rem;color:#78716c;margin:8px 0;min-height:1.2em}
.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn{background:#ca8a04;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.9rem}
.btn.sec{background:#78716c}
.ad{max-width:320px;margin:12px auto;background:#fff;border:1px dashed #d6d3d1;border-radius:6px;padding:8px;text-align:center;font-size:10px;color:#a8a29e}
.cta{font-size:11px;color:#78716c;text-align:center;margin-top:6px}
.cta a{color:#b45309;text-decoration:none}
</style>
</head>
<body>
<h1>📝 Word Scramble: Business Terms</h1>
<p class="sub">Tap letters to spell the word — hint included!</p>
<div id="hud">Score: <span id="score">0</span> · Round: <span id="round">1</span>/10</div>
<p id="hint"></p>
<p id="scramble"></p>
<div id="answer"></div>
<div id="letters"></div>
<p id="msg">Tap letters in order to spell the word</p>
<div class="btns">
<button class="btn sec" id="clear">Clear</button>
<button class="btn" id="skip">Skip</button>
</div>
<button class="btn" id="restart" style="display:none;margin:12px auto">Play Again</button>
<div class="ad">AdSense placeholder — 320×50</div>
<p class="cta">Business tools: <a href="/go/invoice.html">BillSnap</a> · <a href="/tools/payment-terms-calculator.html">Net 30 calc</a></p>
<script>
(function(){
const WORDS=[
  {w:'INVOICE',h:'Bill you send to clients'},
  {w:'FREELANCE',h:'Working for yourself'},
  {w:'CONTRACT',h:'Legal agreement document'},
  {w:'RECEIPT',h:'Proof of payment'},
  {w:'QUARTER',h:'Three-month tax period'},
  {w:'RETAINER',h:'Monthly client fee'},
  {w:'PROFIT',h:'Revenue minus expenses'},
  {w:'UPTIME',h:'Server availability percent'},
  {w:'WEBHOOK',h:'HTTP callback event'},
  {w:'MARGIN',h:'Profit percentage on sales'}
];
let pool=[],answer=[],picked=[],score=0,round=0,current=null,gameOver=false;

function shuffle(s){return s.split('').sort(()=>Math.random()-.5);}

function next(){
  if(round>=10){endGame();return;}
  current=WORDS[round];round++;
  pool=shuffle(current.w);answer=[];picked=[];gameOver=false;
  document.getElementById('round').textContent=round;
  document.getElementById('hint').textContent='Hint: '+current.h;
  document.getElementById('scramble').textContent=pool.join(' ');
  document.getElementById('msg').textContent='Spell: '+current.w.length+' letters';
  render();
}

function render(){
  const ans=document.getElementById('answer');ans.innerHTML='';
  for(let i=0;i<current.w.length;i++){
    const s=document.createElement('div');s.className='slot';
    s.textContent=answer[i]||'';ans.appendChild(s);
  }
  const letEl=document.getElementById('letters');letEl.innerHTML='';
  pool.forEach((ch,i)=>{
    const el=document.createElement('div');el.className='letter'+(picked.includes(i)?' used':'');
    el.textContent=ch;
    if(!picked.includes(i))el.onclick=()=>pick(i);
    letEl.appendChild(el);
  });
}

function pick(i){
  if(gameOver||answer.length>=current.w.length||picked.includes(i))return;
  picked.push(i);answer.push(pool[i]);render();
  if(answer.length===current.w.length)check();
}

function check(){
  const guess=answer.join('');
  if(guess===current.w){
    score+=10+(round>5?5:0);
    document.getElementById('score').textContent=score;
    document.getElementById('msg').textContent='✅ Correct! +'+ (10+(round>5?5:0));
    setTimeout(next,900);
  }else{
    document.getElementById('msg').textContent='❌ Wrong — try again';
    answer=[];picked=[];setTimeout(render,600);
  }
}

function endGame(){
  gameOver=true;
  document.getElementById('msg').textContent='🏆 Done! Final score: '+score+'/100+';
  document.getElementById('restart').style.display='block';
  document.getElementById('letters').innerHTML='';
}

document.getElementById('clear').onclick=()=>{if(!gameOver){answer=[];picked=[];render();}};
document.getElementById('skip').onclick=()=>{if(!gameOver){document.getElementById('msg').textContent='Skipped: '+current.w;setTimeout(next,800);}};
document.getElementById('restart').onclick=()=>{score=0;round=0;document.getElementById('score').textContent=0;document.getElementById('restart').style.display='none';next();};
next();
})();
</script>
</body>
</html>
