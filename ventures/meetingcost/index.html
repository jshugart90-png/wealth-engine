<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meeting Cost Calculator — How much does this meeting cost?</title>
  <meta name="description" content="Calculate the true cost of meetings. Shareable viral tool. Free — pro exports $5.">
  <style>
    body{font-family:system-ui,sans-serif;max-width:520px;margin:40px auto;padding:20px}
    input{width:100%;padding:10px;margin:6px 0 14px;border:1px solid #ccc;border-radius:6px}
    .result{font-size:48px;font-weight:bold;color:#dc2626;margin:20px 0}
    a.btn{display:inline-block;background:#2563eb;color:#fff;padding:12px 20px;text-decoration:none;border-radius:6px}
  </style>
</head>
<body>
  <div style="background:#dc2626;color:#fff;padding:10px 16px;text-align:center;font-size:13px;margin:-40px -20px 24px"><strong>LAUNCH25</strong> · <a href="/go/meeting-team.html" style="color:#fff;font-weight:700">Team: 50 reports/mo — $29 →</a></div>
  <h1>Meeting Cost Calculator</h1>
  <p>How much does this meeting <em>actually</em> cost the company?</p>
  <label>Attendees</label><input type="number" id="attendees" value="8">
  <label>Average hourly rate ($)</label><input type="number" id="rate" value="75">
  <label>Duration (minutes)</label><input type="number" id="minutes" value="60">
  <div class="result" id="out">$600</div>
  <p>Share this number with your team. <a href="{{PAY:meeting-pro}}">Pro report — $5</a></p>
  <button type="button" class="btn" id="share" style="border:none;cursor:pointer;margin-right:8px">Copy share link</button>
  <a class="btn" href="/statusping/index.html">Monitor uptime instead →</a>
  <script>
    function logMeeting(attendees, rate, minutes, cost){
      try{
        var rows=JSON.parse(localStorage.getItem('meetingcost_history')||'[]');
        rows.unshift({
          date:new Date().toISOString().slice(0,10),
          attendees:attendees,
          rate:rate,
          minutes:minutes,
          cost:cost,
          notes:'calculated'
        });
        localStorage.setItem('meetingcost_history',JSON.stringify(rows.slice(0,100)));
        var raw=JSON.parse(localStorage.getItem('meetingcost_reports_mo')||'{}');
        var month=new Date().toISOString().slice(0,7);
        if(raw.month!==month)raw={month:month,count:0};
        raw.count=(raw.count||0)+1;
        localStorage.setItem('meetingcost_reports_mo',JSON.stringify(raw));
      }catch(e){}
    }
    function calc(){
      var a=+attendees.value||0,r=+rate.value||0,m=+minutes.value||0;
      var costNum=Math.round(a*r*m/60);
      var cost='$'+costNum.toLocaleString();
      out.textContent=cost;
      try{localStorage.setItem('meetingcost_last',cost)}catch(e){}
      logMeeting(a,r,m,costNum);
    }
    [attendees,rate,minutes].forEach(el=>el.oninput=calc);calc();
    if(location.search.includes('share=1')) document.title='This meeting costs '+out.textContent;
    document.getElementById('share').onclick=()=>{
      const u=location.origin+location.pathname+'?share=1&a='+attendees.value+'&r='+rate.value+'&m='+minutes.value;
      navigator.clipboard.writeText(u);alert('Share link copied!');
    };
  </script>
</body>
</html>
