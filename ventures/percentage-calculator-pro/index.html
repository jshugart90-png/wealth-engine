<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Percentage Calculator Pro — % of, change &amp; difference</title>
  <meta name="description" content="Calculate percentages instantly — what is X% of Y, percent change, difference, reverse pricing, and compound growth.">
  <meta name="theme-color" content="#4338ca">
  <style>
    :root {
      --bg: #1e1b4b;
      --card: #312e81;
      --border: #4338ca;
      --text: #eef2ff;
      --muted: #a5b4fc;
      --accent: #818cf8;
      --accent-dim: #6366f1;
      --success: #34d399;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: max(16px, env(safe-area-inset-top)) 16px max(32px, env(safe-area-inset-bottom));
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 8px 0 4px; font-weight: 700; }
    .tagline { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="number"] {
      width: 100%;
      font-size: 1.35rem;
      font-weight: 600;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      padding: 10px 6px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      line-height: 1.3;
    }
    .mode-btn.active {
      border-color: var(--accent);
      background: rgba(129, 140, 248, 0.15);
      color: var(--accent);
    }
    .pro-mode-row { display: none; }
    body.we-iap-premium .pro-mode-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .result-card { text-align: center; padding: 24px 16px; }
    .result-main {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .result-sub { color: var(--muted); font-size: 1rem; line-height: 1.5; }
    .result-sub strong { color: var(--text); }
    .breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .breakdown-item {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .breakdown-item .val { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
    .breakdown-item .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .compound-steps {
      margin-top: 16px;
      text-align: left;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .compound-steps li { margin-bottom: 4px; }
    .history {
      margin-top: 16px;
      text-align: left;
      max-height: 140px;
      overflow-y: auto;
    }
    .history-item {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent-dim); color: #1e1b4b; }
    .btn-secondary { background: var(--card); color: var(--text); border: 2px solid var(--border); }
    .btn:active { opacity: 0.85; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #064e3b;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.25s;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .pro-only { display: none; }
    body.we-iap-premium .pro-only { display: block; }
    .panel { display: none; }
    .panel.active { display: block; }
    .sign-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .sign-btn {
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }
    .sign-btn.active { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Percentage Calculator Pro</h1>
    <p class="tagline">% of, percent change, difference &amp; reverse math</p>

    <div class="card">
      <div class="mode-row" id="mode-row">
        <button type="button" class="mode-btn active" data-mode="of">% Of</button>
        <button type="button" class="mode-btn" data-mode="what">What %</button>
        <button type="button" class="mode-btn" data-mode="change">Change</button>
      </div>
      <div class="pro-mode-row" id="pro-mode-row">
        <button type="button" class="mode-btn" data-mode="diff">Diff %</button>
        <button type="button" class="mode-btn" data-mode="reverse">Reverse</button>
        <button type="button" class="mode-btn" data-mode="compound">Compound</button>
      </div>

      <div class="panel active" id="panel-of">
        <div class="field">
          <label for="of-pct">Percentage</label>
          <input type="number" id="of-pct" value="15" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="of-num">Of number</label>
          <input type="number" id="of-num" value="250" step="0.01" inputmode="decimal">
        </div>
      </div>

      <div class="panel" id="panel-what">
        <div class="field">
          <label for="what-part">Part (value)</label>
          <input type="number" id="what-part" value="40" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="what-whole">Whole (total)</label>
          <input type="number" id="what-whole" value="250" step="0.01" inputmode="decimal">
        </div>
      </div>

      <div class="panel" id="panel-change">
        <div class="field">
          <label for="chg-val">Starting value</label>
          <input type="number" id="chg-val" value="100" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="chg-pct">Change by %</label>
          <input type="number" id="chg-pct" value="15" step="0.01" inputmode="decimal">
          <div class="sign-row">
            <button type="button" class="sign-btn active" id="chg-inc" data-sign="1">Increase</button>
            <button type="button" class="sign-btn" id="chg-dec" data-sign="-1">Decrease</button>
          </div>
        </div>
      </div>

      <div class="panel pro-only" id="panel-diff">
        <div class="field">
          <label for="diff-a">Value A</label>
          <input type="number" id="diff-a" value="120" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="diff-b">Value B</label>
          <input type="number" id="diff-b" value="150" step="0.01" inputmode="decimal">
        </div>
        <p class="hint">Pro: percent increase/decrease from A to B</p>
      </div>

      <div class="panel pro-only" id="panel-reverse">
        <div class="field">
          <label for="rev-result">Final value (after change)</label>
          <input type="number" id="rev-result" value="115" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="rev-pct">Change was %</label>
          <input type="number" id="rev-pct" value="15" step="0.01" inputmode="decimal">
          <div class="sign-row">
            <button type="button" class="sign-btn active" id="rev-inc" data-sign="1">After increase</button>
            <button type="button" class="sign-btn" id="rev-dec" data-sign="-1">After decrease</button>
          </div>
        </div>
        <p class="hint">Pro: find original value before the % change</p>
      </div>

      <div class="panel pro-only" id="panel-compound">
        <div class="field">
          <label for="cmp-start">Starting value</label>
          <input type="number" id="cmp-start" value="1000" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="cmp-steps">Changes (comma-separated %)</label>
          <input type="number" id="cmp-steps" value="10" step="0.01" inputmode="decimal" style="display:none">
          <input type="text" id="cmp-chain" value="10, -5, 8" inputmode="text" style="font-size:1rem">
          <p class="hint">Pro: apply multiple % changes in sequence (e.g. 10, -5, 8)</p>
        </div>
      </div>
    </div>

    <div class="card result-card">
      <div class="result-main" id="result-main">37.50</div>
      <div class="result-sub" id="result-sub"><strong>15%</strong> of <strong>250</strong> = <strong>37.50</strong></div>

      <div class="breakdown" id="breakdown">
        <div class="breakdown-item">
          <div class="val" id="bd-1">37.50</div>
          <div class="lbl">Result</div>
        </div>
        <div class="breakdown-item">
          <div class="val" id="bd-2">212.50</div>
          <div class="lbl">Remainder</div>
        </div>
      </div>

      <ol class="compound-steps pro-only" id="compound-list" style="display:none"></ol>

      <div class="history pro-only" id="history" style="display:none"></div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" id="reset">Reset</button>
        <button type="button" class="btn btn-primary" id="share">Share result</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    (function () {
      var mode = "of";
      var chgSign = 1;
      var revSign = 1;
      var STORAGE_KEY = "pctcalcpro_last";
      var HISTORY_KEY = "pctcalcpro_history";
      var toastEl = document.getElementById("toast");

      function fmt(n, dec) {
        if (isNaN(n) || !isFinite(n)) return "—";
        return (+n).toFixed(dec == null ? 2 : dec);
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        setTimeout(function () { toastEl.classList.remove("show"); }, 2000);
      }

      function setMode(m) {
        mode = m;
        document.querySelectorAll(".mode-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.mode === m);
        });
        document.querySelectorAll(".panel").forEach(function (p) {
          p.classList.toggle("active", p.id === "panel-" + m);
        });
        calc();
      }

      function bindSign(btnInc, btnDec, getter, setter) {
        btnInc.addEventListener("click", function () {
          setter(1);
          btnInc.classList.add("active");
          btnDec.classList.remove("active");
          calc();
        });
        btnDec.addEventListener("click", function () {
          setter(-1);
          btnDec.classList.add("active");
          btnInc.classList.remove("active");
          calc();
        });
      }

      bindSign(document.getElementById("chg-inc"), document.getElementById("chg-dec"), function () { return chgSign; }, function (v) { chgSign = v; });
      bindSign(document.getElementById("rev-inc"), document.getElementById("rev-dec"), function () { return revSign; }, function (v) { revSign = v; });

      document.querySelectorAll(".mode-btn").forEach(function (btn) {
        btn.addEventListener("click", function () { setMode(btn.dataset.mode); });
      });

      function saveHistory(summary) {
        try {
          var list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
          list.unshift({ t: Date.now(), s: summary });
          localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 20)));
          renderHistory();
        } catch (e) {}
      }

      function renderHistory() {
        var el = document.getElementById("history");
        if (!document.body.classList.contains("we-iap-premium")) {
          el.style.display = "none";
          return;
        }
        var list = [];
        try { list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); } catch (e) {}
        if (!list.length) { el.style.display = "none"; return; }
        el.style.display = "block";
        el.innerHTML = list.slice(0, 5).map(function (item) {
          return "<div class=\"history-item\">" + item.s + "</div>";
        }).join("");
      }

      function calc() {
        var main = document.getElementById("result-main");
        var sub = document.getElementById("result-sub");
        var bd1 = document.getElementById("bd-1");
        var bd2 = document.getElementById("bd-2");
        var cmpList = document.getElementById("compound-list");
        cmpList.style.display = "none";
        document.getElementById("breakdown").style.display = "grid";

        var summary = "";

        if (mode === "of") {
          var pct = +document.getElementById("of-pct").value || 0;
          var num = +document.getElementById("of-num").value || 0;
          var res = num * pct / 100;
          main.textContent = fmt(res);
          sub.innerHTML = "<strong>" + fmt(pct, 1) + "%</strong> of <strong>" + fmt(num) + "</strong> = <strong>" + fmt(res) + "</strong>";
          bd1.textContent = fmt(res);
          bd2.textContent = fmt(num - res);
          document.getElementById("bd-2").parentElement.querySelector(".lbl").textContent = "Remainder";
          summary = fmt(pct, 1) + "% of " + fmt(num) + " = " + fmt(res);
        } else if (mode === "what") {
          var part = +document.getElementById("what-part").value || 0;
          var whole = +document.getElementById("what-whole").value || 1;
          var pctW = whole ? part / whole * 100 : 0;
          main.textContent = fmt(pctW, 1) + "%";
          sub.innerHTML = "<strong>" + fmt(part) + "</strong> is <strong>" + fmt(pctW, 1) + "%</strong> of <strong>" + fmt(whole) + "</strong>";
          bd1.textContent = fmt(pctW, 1) + "%";
          bd2.textContent = fmt(part);
          document.getElementById("bd-2").parentElement.querySelector(".lbl").textContent = "Part";
          summary = fmt(part) + " is " + fmt(pctW, 1) + "% of " + fmt(whole);
        } else if (mode === "change") {
          var val = +document.getElementById("chg-val").value || 0;
          var cp = +document.getElementById("chg-pct").value || 0;
          var delta = val * cp / 100 * chgSign;
          var after = val + delta;
          main.textContent = fmt(after);
          var dir = chgSign > 0 ? "increase" : "decrease";
          sub.innerHTML = "<strong>" + fmt(val) + "</strong> " + dir + " by <strong>" + fmt(cp, 1) + "%</strong> → <strong>" + fmt(after) + "</strong>";
          bd1.textContent = fmt(after);
          bd2.textContent = (delta >= 0 ? "+" : "") + fmt(delta);
          document.getElementById("bd-2").parentElement.querySelector(".lbl").textContent = "Change";
          summary = fmt(val) + " " + dir + " " + fmt(cp, 1) + "% = " + fmt(after);
        } else if (mode === "diff") {
          var a = +document.getElementById("diff-a").value || 0;
          var b = +document.getElementById("diff-b").value || 0;
          var diffPct = a ? (b - a) / a * 100 : 0;
          main.textContent = (diffPct >= 0 ? "+" : "") + fmt(diffPct, 1) + "%";
          sub.innerHTML = "From <strong>" + fmt(a) + "</strong> to <strong>" + fmt(b) + "</strong> = <strong>" + fmt(diffPct, 1) + "%</strong> change";
          bd1.textContent = fmt(b - a);
          bd2.textContent = fmt(a);
          document.getElementById("bd-2").parentElement.querySelector(".lbl").textContent = "Original";
          summary = fmt(a) + " → " + fmt(b) + " = " + fmt(diffPct, 1) + "%";
        } else if (mode === "reverse") {
          var fin = +document.getElementById("rev-result").value || 0;
          var rp = +document.getElementById("rev-pct").value || 0;
          var orig = revSign > 0 ? fin / (1 + rp / 100) : fin / (1 - rp / 100);
          main.textContent = fmt(orig);
          var rdir = revSign > 0 ? "increase" : "decrease";
          sub.innerHTML = "Before <strong>" + fmt(rp, 1) + "%</strong> " + rdir + ", value was <strong>" + fmt(orig) + "</strong>";
          bd1.textContent = fmt(orig);
          bd2.textContent = fmt(fin);
          document.getElementById("bd-2").parentElement.querySelector(".lbl").textContent = "Final";
          summary = "Original before " + fmt(rp, 1) + "% " + rdir + " = " + fmt(orig);
        } else if (mode === "compound") {
          var start = +document.getElementById("cmp-start").value || 0;
          var chain = document.getElementById("cmp-chain").value.split(",").map(function (s) { return parseFloat(s.trim()); }).filter(function (n) { return !isNaN(n); });
          var cur = start;
          var steps = [];
          chain.forEach(function (p, i) {
            var prev = cur;
            cur = cur * (1 + p / 100);
            steps.push("Step " + (i + 1) + ": " + fmt(prev) + " " + (p >= 0 ? "+" : "") + fmt(p, 1) + "% → " + fmt(cur));
          });
          var totalPct = start ? (cur - start) / start * 100 : 0;
          main.textContent = fmt(cur);
          sub.innerHTML = "<strong>" + fmt(start) + "</strong> after " + chain.length + " changes → <strong>" + fmt(cur) + "</strong> (<strong>" + fmt(totalPct, 1) + "%</strong> net)";
          bd1.textContent = fmt(cur);
          bd2.textContent = fmt(totalPct, 1) + "%";
          document.getElementById("bd-2").parentElement.querySelector(".lbl").textContent = "Net change";
          document.getElementById("breakdown").style.display = "none";
          cmpList.style.display = "block";
          cmpList.innerHTML = steps.map(function (s) { return "<li>" + s + "</li>"; }).join("");
          summary = fmt(start) + " compound → " + fmt(cur) + " (" + fmt(totalPct, 1) + "% net)";
        }

        try { localStorage.setItem(STORAGE_KEY, summary); } catch (e) {}
        if (summary) saveHistory(summary);
      }

      ["of-pct", "of-num", "what-part", "what-whole", "chg-val", "chg-pct", "diff-a", "diff-b", "rev-result", "rev-pct", "cmp-start", "cmp-chain"].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener("input", calc);
      });

      document.getElementById("reset").addEventListener("click", function () {
        document.getElementById("of-pct").value = "15";
        document.getElementById("of-num").value = "250";
        document.getElementById("what-part").value = "40";
        document.getElementById("what-whole").value = "250";
        document.getElementById("chg-val").value = "100";
        document.getElementById("chg-pct").value = "15";
        document.getElementById("diff-a").value = "120";
        document.getElementById("diff-b").value = "150";
        document.getElementById("rev-result").value = "115";
        document.getElementById("rev-pct").value = "15";
        document.getElementById("cmp-start").value = "1000";
        document.getElementById("cmp-chain").value = "10, -5, 8";
        chgSign = 1; revSign = 1;
        document.getElementById("chg-inc").classList.add("active");
        document.getElementById("chg-dec").classList.remove("active");
        document.getElementById("rev-inc").classList.add("active");
        document.getElementById("rev-dec").classList.remove("active");
        setMode("of");
        showToast("Reset to defaults");
      });

      document.getElementById("share").addEventListener("click", function () {
        var text = document.getElementById("result-sub").textContent.replace(/\s+/g, " ").trim() + " (Percentage Calculator Pro)";
        if (navigator.share) {
          navigator.share({ title: "Percentage Calculator Pro", text: text }).catch(function () {});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function () { showToast("Copied to clipboard"); });
        } else {
          showToast(text);
        }
      });

      renderHistory();
      calc();
    })();
  </script>
</body>
</html>
