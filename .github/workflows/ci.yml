name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ventures
        run: npm run build
        env:
          MARKETING_BASE_URL: https://wealth-engine-0qlj.onrender.com

      - name: Verify production asset URLs
        run: node scripts/verify-prod-assets.mjs

      - name: Health check
        run: npm run health
        env:
          # Health expects stripe links file — CI may lack Stripe; create minimal stub if needed
          CI: true

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy staging (Render)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL not set — skip staging deploy"
            echo "Create Render web service from deploy/render.yaml, add deploy hook secret"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Staging deploy triggered"
