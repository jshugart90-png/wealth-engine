<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1625;color:#f5f3ff;font-family:system-ui,sans-serif;min-height:100vh;padding:12px;touch-action:manipulation;user-select:none}
.offline{display:none;background:#7f1d1d;color:#fecaca;text-align:center;padding:8px 12px;font-size:12px;margin:-12px -12px 8px}
.offline.show{display:block}
h1{font-size:1.15rem;text-align:center;margin-bottom:4px;color:#c4b5fd}

.ad{max-width:320px;margin:8px auto;background:#2e2640;border:1px dashed #4c3d6e;border-radius:6px;padding:8px;text-align:center;font-size:10px;color:#8b7cb8}
.cta{font-size:11px;color:#a78bfa;text-align:center;margin-top:6px}
.cta a{color:#c4b5fd;text-decoration:none}
</style>

<body>
<div id="offline-banner" class="offline" role="status">You're offline — game works after first load</div>
<h1>📄 NDA Speed Sign</h1>
<p class="sub">Match clause pairs fast — sign the deal!</p>
<div id="hud">Pairs: <span id="pairs">0</span>/8 · Moves: <span id="moves">0</span> · Best: <span id="best">—</span></div>
<div id="timer">⏱ <span id="secs">0.0</span>s</div>
<div id="grid"></div>
<p id="msg">Tap two cards to match NDA clauses</p>
<button class="btn" id="restart" style="display:none">Sign Again</button>
<div class="ad">AdSense placeholder — 320×50</div>
<p class="cta">Draft NDAs for real: <a href="/go/freelancer.html">NDAGen</a> · <a href="/tools/index.html">Free Tools</a></p>
<script>
(function(){
const CLAUSES=[
  ['Confidentiality','Shall not disclose confidential information'],
  ['Non-Compete','No competing work during agreement term'],
  ['Term','Agreement expires after stated period'],
  ['Governing Law','Disputes resolved per chosen jurisdiction'],
  ['Return of Materials','Return all confidential docs on exit'],
  ['Injunctive Relief','Breach may seek equitable injunction'],
  ['No License','No IP or ownership rights granted'],
  ['Survivability','Obligations survive after termination']
];
const BEST_KEY='nda_speed_sign_best';
let cards=[],flipped=[],moves=0,matched=0,lock=false,best=0,t0=0,timerId=null,running=false;
try{best=parseInt(localStorage.getItem(BEST_KEY)||'0',10)||0}catch(e){}
function showBest(){document.getElementById('best').textContent=best?best+'s':'—'}
function saveBest(sec){
  if(!best||sec<best){best=sec;try{localStorage.setItem(BEST_KEY,String(best))}catch(e){}showBest()}
}
showBest();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function stopTimer(){
  if(timerId){clearInterval(timerId);timerId=null}
  running=false;
}

function startTimer(){
  t0=performance.now();
  running=true;
  timerId=setInterval(()=>{
    if(running)document.getElementById('secs').textContent=((performance.now()-t0)/1000).toFixed(1);
  },100);
}

function elapsed(){return Math.round((performance.now()-t0)/100)/10}

function build(){
  stopTimer();
  const pairs=CLAUSES.flatMap((p,i)=>[
    {id:i,label:p[0],side:'title'},
    {id:i,label:p[1],side:'body'}
  ]);
  cards=shuffle(pairs);flipped=[];moves=0;matched=0;lock=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('secs').textContent='0.0';
  document.getElementById('msg').textContent='Tap two cards to match NDA clauses';
  document.getElementById('restart').style.display='none';
  render();
  startTimer();
}

function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  cards.forEach((card,i)=>{
    const el=document.createElement('div');
    const open=flipped.includes(i)||card.done;
    el.className='card'+(open?' flipped':'')+(card.done?' matched':'');
    el.innerHTML=open?'<span class="label">'+card.label+'</span>':'<span class="back">?</span>';
    el.onclick=()=>tap(i);
    g.appendChild(el);
  });
}

function tap(i){
  if(lock||flipped.includes(i)||cards[i].done)return;
  flipped.push(i);render();
  if(flipped.length===2){
    lock=true;moves++;
    document.getElementById('moves').textContent=moves;
    const[a,b]=flipped;
    if(cards[a].id===cards[b].id&&cards[a].side!==cards[b].side){
      cards[a].done=cards[b].done=true;matched++;
      document.getElementById('pairs').textContent=matched;
      document.getElementById('msg').textContent='✓ '+CLAUSES[cards[a].id][0]+' matched!';
      flipped=[];lock=false;render();
      if(matched===8){
        stopTimer();
        const sec=elapsed();
        saveBest(sec);
        document.getElementById('msg').textContent='🏆 Signed in '+sec+'s ('+moves+' moves)!';
        document.getElementById('restart').style.display='block';
      }
    }else{
      document.getElementById('msg').textContent='Clause mismatch — try again';
      setTimeout(()=>{flipped=[];lock=false;render();},650);
    }
  }
}

document.getElementById('restart').onclick=build;
var banner=document.getElementById('offline-banner');
function setOffline(){if(banner)banner.classList.toggle('show',!navigator.onLine)}
window.addEventListener('online',setOffline);
window.addEventListener('offline',setOffline);
setOffline();
build();
})();
</script>
