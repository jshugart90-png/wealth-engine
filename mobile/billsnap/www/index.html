<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BillSnap</title>
<meta name="description" content="Invoice PDF in 30 seconds — preview free, $3 pro export">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f8fafc">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/assets/pwa/icon-192.png">
<style>
body{font-family:system-ui,sans-serif;background:#f8fafc;color:#0f172a;margin:0;padding:0 20px 40px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.offline{display:none;background:#7f1d1d;color:#fecaca;text-align:center;padding:10px 16px;font-size:13px;width:100%}
.offline.show{display:block}
h1{margin:32px 0 8px;font-size:1.6rem}
.sub{color:#64748b;text-align:center;margin-bottom:20px;max-width:340px;line-height:1.5}
.stat{background:#fff;border:2px solid #cbd5e1;border-radius:12px;padding:16px 28px;margin-bottom:16px;text-align:center;box-shadow:0 1px 3px rgba(15,23,42,.06)}
.stat span{font-size:1.4rem;font-weight:700;color:#2563eb}
.features{max-width:320px;margin-bottom:24px;font-size:14px;color:#64748b;line-height:1.6}
.features li{margin-bottom:6px}
.cta{display:inline-block;background:#2563eb;color:#fff;text-decoration:none;padding:14px 32px;border-radius:10px;font-weight:700;font-size:1.1rem;margin-bottom:16px}
.cta:hover{background:#1d4ed8}
.links{font-size:13px;color:#64748b;margin-top:20px}
.links a{color:#2563eb}
</style></head><body>
<div id="offline-banner" class="offline" role="status">You're offline — open BillSnap if you've used it before</div>
<h1>🧾 BillSnap</h1>
<p class="sub">Invoice PDF in 30 seconds — preview free, $3 pro export</p>
<div class="stat">Last invoice #<br><span id="last-stat">—</span></div>
<ul class="features">
  <li>Free preview — pay $3 only to export PDF</li>
  <li>No subscription or signup wall</li>
  <li>Draft saved locally on your device</li>
</ul>
<a class="cta" href="billsnap/index.html">Create Invoice</a>
<p class="links"><a href="privacy.html">Privacy</a> · <a href="https://wealth-engine-0qlj.onrender.com/tools/">More tools</a></p>
<script>(function(){
  var KEY='billsnap_last_invoice';
  var el=document.getElementById('last-stat');
  try{var v=localStorage.getItem(KEY);if(el&&v)el.textContent=v}catch(e){}
  var banner=document.getElementById('offline-banner');
  function setOffline(){if(banner)banner.classList.toggle('show',!navigator.onLine)}
  window.addEventListener('online',setOffline);
  window.addEventListener('offline',setOffline);
  setOffline();
})();</script>
</body></html>
