body{font-family:system-ui,sans-serif;background:#111827;color:#f3f4f6;margin:0;padding:0 20px 40px;min-height:100vh;display:flex;flex-direction:column;align-items:center}

h1{margin:32px 0 8px;font-size:1.6rem}

.best{background:rgba(255,255,255,.06);border:2px solid #374151;border-radius:12px;padding:16px 28px;margin-bottom:24px;text-align:center}
.best span{font-size:2rem;font-weight:700;color:#a78bfa}

<div id="offline-banner" class="offline" role="status">You're offline — tap Play if you've opened the game before</div>

<div class="best">Fewest moves<br><span id="best-score">—</span></div>

<script>(function(){
  var KEY='freelancer_memory_best';
  var el=document.getElementById('best-score');
  try{var b=parseInt(localStorage.getItem(KEY)||'0',10);if(el)el.textContent=b&&!isNaN(b)?b:'—'}catch(e){}
  var banner=document.getElementById('offline-banner');
  function setOffline(){if(banner)banner.classList.toggle('show',!navigator.onLine)}
  window.addEventListener('online',setOffline);
  window.addEventListener('offline',setOffline);
  setOffline();
})();</script>
