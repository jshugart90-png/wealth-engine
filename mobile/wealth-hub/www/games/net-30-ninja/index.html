<div id="wrap">
<h1>🥷 Net-30 Ninja</h1>
<p class="sub">Jump over late invoices and net-30 traps!</p>
<div id="hud">Score: <span id="score">0</span> · Best: <span id="best">0</span> · Lives: <span id="lives">3</span></div>
<canvas id="c" width="360" height="480"></canvas>
<p id="msg">Tap or space to jump — dodge late invoices!</p>
<button class="btn" id="restart" style="display:none">Play Again</button>
<p class="cta">Get paid faster: <a href="/go/invoice.html">BillSnap Invoices</a> · <a href="/tools/late-fee-calculator.html">Late Fee Calc</a></p>
</div>
<script>
(function(){
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=360,H=480;
const BEST_KEY='net_30_ninja_best';
let ninjaY=300,vy=0,onGround=true,obstacles=[],spawnT=0,score=0,best=0,lives=3,gameOver=false,speed=4;
try{best=parseInt(localStorage.getItem(BEST_KEY)||'0',10)||0}catch(e){}
document.getElementById('best').textContent=best;

function reset(){
  ninjaY=300;vy=0;onGround=true;obstacles=[];spawnT=0;score=0;lives=3;gameOver=false;speed=4;
  document.getElementById('score').textContent=0;
  document.getElementById('lives').textContent=3;
  document.getElementById('restart').style.display='none';
  document.getElementById('msg').textContent='Tap or space to jump — dodge late invoices!';
}

function jump(){
  if(gameOver)return;
  if(onGround){vy=-11;onGround=false;}
}

function spawn(){
  const late=Math.random()<0.35;
  obstacles.push({x:W+20,h:late?50:35,late,w:28});
}

function endGame(){
  gameOver=true;
  if(score>best){best=score;try{localStorage.setItem(BEST_KEY,String(best))}catch(e){}document.getElementById('best').textContent=best;}
  document.getElementById('msg').textContent='Game Over! Score: '+score;
  document.getElementById('restart').style.display='inline-block';
}

function update(){
  if(gameOver)return;
  vy+=0.45;ninjaY+=vy;
  if(ninjaY>=300){ninjaY=300;vy=0;onGround=true;}
  spawnT++;
  if(spawnT>45){spawnT=0;spawn();}
  obstacles.forEach((o,i)=>{
    o.x-=speed;
    if(o.x<60&&o.x+o.w>20&&ninjaY+40>=300-o.h){
      obstacles.splice(i,1);
      if(o.late){lives--;document.getElementById('lives').textContent=lives;document.getElementById('msg').textContent='Late invoice hit! -1 life';
        if(lives<=0)endGame();
      }else{score+=10;document.getElementById('score').textContent=score;}
    }else if(o.x<-40){
      obstacles.splice(i,1);
      score+=2;document.getElementById('score').textContent=score;
    }
  });
  if(score>0&&score%100===0)speed=Math.min(8,speed+0.01);
}

function draw(){
  ctx.fillStyle='#1e293b';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#334155';ctx.fillRect(0,340,W,140);
  ctx.fillStyle='#38bdf8';ctx.fillRect(30,ninjaY,30,40);
  ctx.fillStyle='#0ea5e9';ctx.fillRect(35,ninjaY-8,20,10);
  obstacles.forEach(o=>{
    ctx.fillStyle=o.late?'#ef4444':'#64748b';
    ctx.fillRect(o.x,340-o.h,o.w,o.h);
    ctx.fillStyle='#fff';ctx.font='10px system-ui';
    ctx.fillText(o.late?'LATE':'$',o.x+6,340-o.h+20);
  });
}

function loop(){update();draw();requestAnimationFrame(loop);}
reset();loop();
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
c.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
c.addEventListener('click',jump);
document.getElementById('restart').onclick=reset;
(function(){
  var banner=document.getElementById('offline-banner');
  function setOffline(){if(banner)banner.classList.toggle('show',!navigator.onLine)}
  window.addEventListener('online',setOffline);
  window.addEventListener('offline',setOffline);
  setOffline();
})();
})();
</script>

</html>+prod.price.toFixed(2)+')?\n\nSandbox mode — receipt verify placeholder until App Store Connect products are live.')){

      return Promise.resolve({key:key,purchased:true,sandbox:true});
    }
    return Promise.reject(new Error('Cancelled'));
  }

  function restore(){
    if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Purchases){
      return window.Capacitor.Plugins.Purchases.restorePurchases().then(function(res){
        (res&&res.customerInfo&&res.customerInfo.entitlements&&res.customerInfo.entitlements.active||{}).forEach(function(){});
        refreshUI();
        return{restored:true};
      });

    refreshUI();

    return Promise.resolve({restored:true,local:true});
  }

  window.WE_IAP={
    app:APP,
    products:PRODUCTS,
    owns:owned,
    shouldShowAds:shouldShowAds,
    purchase:purchase,
    restore:restore,
    refresh:refreshUI
  };

  function wireUI(){
    var bar=document.getElementById('we-iap-bar');
    if(!bar)return;
    var removeBtn=document.getElementById('we-iap-remove-ads');
    var premiumBtn=document.getElementById('we-iap-premium');
    var restoreBtn=document.getElementById('we-iap-restore');
    var tipBtn=document.getElementById('we-iap-tip');
    if(removeBtn)removeBtn.addEventListener('click',function(){WE_IAP.purchase('remove_ads').catch(function(){})});
    if(premiumBtn)premiumBtn.addEventListener('click',function(){
      WE_IAP.purchase('premium_unlock').catch(function(){});
    });
    if(restoreBtn)restoreBtn.addEventListener('click',function(){WE_IAP.restore()});
    if(tipBtn)tipBtn.addEventListener('click',function(){WE_IAP.purchase('tip_jar').catch(function(){})});
    refreshUI();
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wireUI);
  else wireUI();
})();</script><script>(function(){
  var WE_ADMOB={appId:'ca-app-pub-3940256099942544~3347511713',banner:'ca-app-pub-3940256099942544/6300978111',rewarded:'ca-app-pub-3940256099942544/5224354917',testMode:true};

  }
  function refreshAds(){

  }

  refreshAds();
  window.WE_showRewardedAd=function(onReward){
