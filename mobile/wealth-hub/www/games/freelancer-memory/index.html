*{box-sizing:border-box;margin:0;padding:0}
body{background:#111827;color:#f3f4f6;font-family:system-ui,sans-serif;min-height:100vh;padding:12px;touch-action:manipulation;user-select:none}

<h1>🧠 Freelancer Memory Match</h1>
<p class="sub">Find matching tool pairs — tap two cards</p>
<div id="hud">Moves: <span id="moves">0</span> · Pairs: <span id="pairs">0</span>/8 · Best: <span id="best">—</span></div>
<div id="grid"></div>
<p id="msg">Find all 8 pairs!</p>
<button class="btn" id="restart" style="display:none">Play Again</button>
<div class="ad">AdSense placeholder — 320×50</div>
<p class="cta">Tools for real work: <a href="/go/freelancer.html">Freelancer Stack</a> · <a href="/tools/index.html">Free calculators</a></p>
<script>
(function(){
const icons=[
  ['🧾','BillSnap'],['📄','NDAGen'],['📡','StatusPing'],['🔗','HookRelay'],
  ['🔧','PipeKit'],['📊','MeetingCost'],['📋','LeaseLens'],['📦','Templates']
];
const BEST_KEY='freelancer_memory_best';
let cards=[],flipped=[],moves=0,matched=0,lock=false,best=0;
try{best=parseInt(localStorage.getItem(BEST_KEY)||'0',10)||0}catch(e){}
function showBest(){document.getElementById('best').textContent=best?best+' moves':'—'}
function saveBest(){
  if(!best||moves<best){best=moves;try{localStorage.setItem(BEST_KEY,String(best))}catch(e){}showBest()}
}
showBest();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function build(){
  const pairs=icons.flatMap((p,i)=>[{id:i,icon:p[0],name:p[1]},{id:i,icon:p[0],name:p[1]}]);
  cards=shuffle(pairs);flipped=[];moves=0;matched=0;lock=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('msg').textContent='Find all 8 pairs!';
  document.getElementById('restart').style.display='none';
  render();
}

function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  cards.forEach((card,i)=>{
    const el=document.createElement('div');
    el.className='card'+(flipped.includes(i)||card.done?' flipped':'')+(card.done?' matched':'');
    el.innerHTML=flipped.includes(i)||card.done?card.icon:'<span class="back">?</span>';
    el.onclick=()=>tap(i);
    g.appendChild(el);
  });
}

function tap(i){
  if(lock||flipped.includes(i)||cards[i].done)return;
  flipped.push(i);render();
  if(flipped.length===2){
    lock=true;moves++;
    document.getElementById('moves').textContent=moves;
    const[a,b]=flipped;
    if(cards[a].id===cards[b].id){
      cards[a].done=cards[b].done=true;matched++;
      document.getElementById('pairs').textContent=matched;
      document.getElementById('msg').textContent='Match! '+cards[a].name;
      flipped=[];lock=false;render();
      if(matched===8){
        saveBest();
        document.getElementById('msg').textContent='🏆 You win in '+moves+' moves!';
        document.getElementById('restart').style.display='block';
      }
    }else{
      document.getElementById('msg').textContent='No match — try again';
      setTimeout(()=>{flipped=[];lock=false;render();},700);
    }
  }
}

document.getElementById('restart').onclick=build;
(function(){
  var banner=document.getElementById('offline-banner');
  function setOffline(){if(banner)banner.classList.toggle('show',!navigator.onLine)}
  window.addEventListener('online',setOffline);
  window.addEventListener('offline',setOffline);
  setOffline();
})();
build();
})();
</script>

  function restore(){

  window.WE_IAP={

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wireUI);
  else wireUI();
})();</script><script>(function(){
