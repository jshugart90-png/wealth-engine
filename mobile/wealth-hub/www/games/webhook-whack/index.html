<script>
(function(){
const HOLES=9;
const BEST_KEY='webhook_whack_best';
let score=0,best=0,timeLeft=30,timer=null,holes=[],gameOver=false,spawnT=null;
try{best=parseInt(localStorage.getItem(BEST_KEY)||'0',10)||0}catch(e){}
document.getElementById('best').textContent=best;

function saveBest(){
  if(score>best){
    best=score;
    document.getElementById('best').textContent=best;
    try{localStorage.setItem(BEST_KEY,String(best))}catch(e){}
  }
}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let i=0;i<HOLES;i++){
    const h=document.createElement('div');h.className='hole';h.dataset.i=i;
    h.innerHTML='<span class="bug">🐛</span>';
    h.onclick=()=>whack(i,h);
    g.appendChild(h);
  }
  holes=[...g.children];
}

function pop(){
  if(gameOver)return;
  holes.forEach(h=>{h.classList.remove('up');h.querySelector('.bug').textContent='🐛';});
  const i=Math.random()*HOLES|0;
  const bad=Math.random()<0.7;
  holes[i].querySelector('.bug').textContent=bad?'🐛':'✅';
  holes[i].dataset.bad=bad?'1':'0';
  holes[i].classList.add('up');
  setTimeout(()=>{holes[i].classList.remove('up');}, bad?900:700);
}

function whack(i,h){
  if(gameOver||!h.classList.contains('up'))return;
  h.classList.remove('up');
  if(h.dataset.bad==='1'){score+=10;document.getElementById('score').textContent=score;document.getElementById('msg').textContent='Whacked! +10';}
  else{score=Math.max(0,score-5);document.getElementById('score').textContent=score;document.getElementById('msg').textContent='That was healthy! -5';}
}

function endGame(){
  gameOver=true;clearInterval(timer);clearInterval(spawnT);
  saveBest();
  document.getElementById('msg').textContent='Time! Final score: '+score+(score>=best&&score>0?' — New best!':score>=150?' 🏆 Webhook hero!':'');
  document.getElementById('restart').style.display='block';
}

function start(){
  score=0;timeLeft=30;gameOver=false;
  document.getElementById('score').textContent=0;
  document.getElementById('time').textContent=30;
  document.getElementById('restart').style.display='none';
  document.getElementById('msg').textContent='Tap the bugs before time runs out!';
  buildGrid();
  timer=setInterval(()=>{timeLeft--;document.getElementById('time').textContent=timeLeft;if(timeLeft<=0)endGame();},1000);
  spawnT=setInterval(pop,800);
  pop();
}

document.getElementById('restart').onclick=start;
start();
var banner=document.getElementById('offline-banner');
function setOffline(){if(banner)banner.classList.toggle('show',!navigator.onLine)}
window.addEventListener('online',setOffline);
window.addEventListener('offline',setOffline);
setOffline();
})();
</script>
