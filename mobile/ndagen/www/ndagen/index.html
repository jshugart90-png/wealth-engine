<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NDAGen — Free NDA Generator</title>
  <meta name="description" content="Generate a mutual NDA in seconds. Free preview. Pro PDF $4 or Team $29/mo (50 exports, 3 seats).">
  <style>
    body{font-family:system-ui;max-width:640px;margin:0 auto;padding:32px 16px 100px;color:#0f172a}
    textarea{width:100%;min-height:200px;padding:12px;font-size:13px;border:1px solid #cbd5e1;border-radius:8px}
    input,select{width:100%;padding:10px;margin:6px 0 12px;border:1px solid #cbd5e1;border-radius:6px}
    button{background:#059669;color:#fff;border:none;padding:12px 20px;border-radius:6px;cursor:pointer;font-weight:600}
    .sticky{position:fixed;bottom:0;left:0;right:0;background:#0f172a;color:#fff;padding:12px;text-align:center;font-size:14px}
    .sticky a{color:#22c55e;font-weight:700}
    .tier{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px;margin:16px 0;font-size:14px}
    .usage{font-size:13px;color:#64748b;margin-top:8px}
  </style>
<meta name="google-site-verification" content="X8W5bw-fSJ0pTZiA0LesNi2vZ_-bUdLqVokR5uJZlI4" />
<script>(function(){try{var r=localStorage.getItem('we_ref')||new URLSearchParams(location.search).get('ref');fetch('/api/funnel/visit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:"/ndagen",refCode:r,source:new URLSearchParams(location.search).get('utm_source')||'direct'})}).catch(function(){})}catch(e){}})();</script></head>
<body>
  <div style="background:#059669;color:#fff;padding:10px 16px;text-align:center;font-size:13px;margin:-32px -16px 24px"><strong>LAUNCH25</strong> · <a href="/go/nda-team.html" style="color:#fff;font-weight:700">Team: 50 NDAs/mo — $29 →</a></div>
  <h1>NDAGen</h1>
  <p>Not legal advice. Template for discussion purposes.</p>
  <label>Party A</label><input id="a" value="Your Company LLC">
  <label>Party B</label><input id="b" value="Counterparty Inc">
  <label>Governing law (US state)</label>
  <select id="state">
    <option value="California">California</option>
    <option value="Texas">Texas</option>
    <option value="New York">New York</option>
    <option value="Florida">Florida</option>
    <option value="Delaware">Delaware</option>
    <option value="Illinois">Illinois</option>
    <option value="Other">Other / specify in doc</option>
  </select>
  <button id="gen">Generate preview</button>
  <textarea id="doc" readonly></textarea>
  <div class="tier">
    <strong>Export options</strong><br>
    <a href="https://buy.stripe.com/7sY9AS0XcdSp0ZvfFD1Nu0c" onclick="trackExport('nda-pdf')">Single PDF — $4</a> ·
    <a href="https://buy.stripe.com/7sYcN435kbKhdMhdxv1Nu0l" onclick="trackExport('ndagen-team-monthly')">Team — $29/mo (50 exports, 3 seats)</a>
  </div>
  <p class="usage" id="usage"></p>
  <p><a href="/p/nda-template-freelancer.html">NDA template guide</a> · <a href="/comparestack/pages/nda-template-generators.html">Compare NDA tools</a></p>
  <div class="sticky">Agency? <a href="/go/nda-team.html">NDAGen Team $29/mo →</a> · Single PDF <a href="https://buy.stripe.com/7sY9AS0XcdSp0ZvfFD1Nu0c">$4 →</a></div>
  <script>
    const USAGE_KEY = 'ndagen_exports_mo';
    const TEAM_LIMIT = 50;
    function monthKey(){ return new Date().toISOString().slice(0,7); }
    function getUsage(){
      const raw = JSON.parse(localStorage.getItem(USAGE_KEY) || '{}');
      if (raw.month !== monthKey()) return { month: monthKey(), count: 0, team: !!localStorage.getItem('ndagen_team_active') };
      return { month: raw.month, count: raw.count || 0, team: !!localStorage.getItem('ndagen_team_active') };
    }
    function trackExport(sku){
      fetch('/api/funnel/checkout_click',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sku,path:'/ndagen'})});
      const u = getUsage();
      if (sku === 'ndagen-team-monthly') localStorage.setItem('ndagen_team_active','1');
    }
    function renderUsage(){
      const u = getUsage();
      usage.textContent = u.team
        ? `Team plan: ${u.count}/${TEAM_LIMIT} exports used this month (local counter)`
        : `Free previews unlimited · ${u.count} export(s) tracked this month`;
    }
    gen.onclick=()=>{
      doc.value=`MUTUAL NON-DISCLOSURE AGREEMENT\n\nBetween ${a.value} and ${b.value}\n\n1. Confidential Information...\n2. Term: 2 years\n3. Governing law: ${state.value}\n\nSign below.`;
      const u = getUsage();
      u.count++;
      localStorage.setItem(USAGE_KEY, JSON.stringify({ month: monthKey(), count: u.count }));
      renderUsage();
    };
    gen.click();
    renderUsage();
  </script>
</body>
</html>
