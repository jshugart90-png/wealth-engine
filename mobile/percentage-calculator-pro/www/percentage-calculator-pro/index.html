  <style>
    :root {
      --bg: #1e1b4b;
      --card: #312e81;

    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);

    }
    .wrap { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 8px 0 4px; font-weight: 700; }
    .tagline { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="number"], textarea {
      width: 100%;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }
    textarea {
      font-size: 0.95rem;
      font-weight: 500;
      min-height: 72px;
      resize: vertical;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .mode-btn {
      padding: 10px 6px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      line-height: 1.3;
    }
    .mode-btn.active {
      border-color: var(--accent);
      background: rgba(129, 140, 248, 0.15);
      color: var(--accent);
    }
    .preset-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 10px 0 4px;
    }
    .preset-btn {
      padding: 10px 4px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .preset-btn.active {
      border-color: var(--accent);
      background: rgba(129, 140, 248, 0.15);
      color: var(--accent);
    }
    .dir-row { display: flex; gap: 8px; margin-top: 8px; }
    .dir-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .dir-btn.active { border-color: var(--accent); color: var(--accent); }
    .dir-btn.up.active { border-color: var(--success); color: var(--success); }
    .dir-btn.down.active { border-color: var(--danger); color: var(--danger); }
    .result-card { text-align: center; padding: 24px 16px; }
    .result-main {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .result-sub { color: var(--muted); font-size: 1rem; line-height: 1.5; }
    .result-sub strong { color: var(--text); }
    .breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .breakdown-item {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .breakdown-item .val { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
    .breakdown-item .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .compound-steps {
      margin-top: 16px;
      text-align: left;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .compound-steps li { margin-bottom: 4px; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent-dim); color: #fff; }
    .btn-secondary { background: var(--card); color: var(--text); border: 2px solid var(--border); }
    .btn:active { opacity: 0.85; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #064e3b;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.25s;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    body.we-iap-premium .pro-only { display: block; }
    .pro-only { display: none; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>

<body>
  <div class="wrap">
    <h1>Percentage Calculator Pro</h1>
    <p class="tagline">% of, what percent, change &amp; compare</p>

    <div class="card">
      <div class="field">
        <label>Calculation mode</label>

      <div class="panel active" id="panel-percent-of">
        <div class="field">
          <label for="po-pct">Percentage (%)</label>
          <input type="number" id="po-pct" value="15" step="0.01" inputmode="decimal">
          <div class="preset-row" data-target="po-pct">
            <button type="button" class="preset-btn" data-val="10">10%</button>
            <button type="button" class="preset-btn active" data-val="15">15%</button>
            <button type="button" class="preset-btn" data-val="20">20%</button>
            <button type="button" class="preset-btn" data-val="25">25%</button>
          </div>
        </div>
        <div class="field">
          <label for="po-of">Of value</label>
          <input type="number" id="po-of" value="250" step="0.01" inputmode="decimal">
        </div>
      </div>

      <div class="panel" id="panel-what-percent">
        <div class="field">
          <label for="wp-part">Part (X)</label>
          <input type="number" id="wp-part" value="40" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="wp-whole">Whole (Y)</label>
          <input type="number" id="wp-whole" value="250" step="0.01" min="0.01" inputmode="decimal">
        </div>
      </div>

      <div class="panel" id="panel-change">
        <div class="field">
          <label for="ch-val">Starting value</label>
          <input type="number" id="ch-val" value="100" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="ch-pct">Change (%)</label>
          <input type="number" id="ch-pct" value="15" step="0.01" inputmode="decimal">
          <div class="dir-row">
            <button type="button" class="dir-btn up active" data-dir="up" id="ch-up">Increase</button>
            <button type="button" class="dir-btn down" data-dir="down" id="ch-down">Decrease</button>

        </div>

      <div class="panel pro-only" id="panel-reverse">
        <div class="field">
          <label for="rv-final">Final value (after change)</label>

        </div>
        <div class="field">
          <label for="rv-pct">Applied change (%)</label>
          <input type="number" id="rv-pct" value="15" step="0.01" inputmode="decimal">
          <div class="dir-row">
            <button type="button" class="dir-btn up active" data-dir="up" id="rv-up">Was increased</button>
            <button type="button" class="dir-btn down" data-dir="down" id="rv-down">Was decreased</button>
          </div>
          <p class="hint">Pro: find original value before a % increase or decrease</p>
        </div>
      </div>

      <div class="panel pro-only" id="panel-compound">
        <div class="field">
          <label for="cp-start">Starting value</label>
          <input type="number" id="cp-start" value="1000" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="cp-steps">Steps (one % per line, e.g. +10, -5, +20)</label>
          <textarea id="cp-steps" placeholder="+10&#10;-5&#10;+15">+10
-5
+15</textarea>
          <p class="hint">Pro: chain multiple % changes — use + or − prefix</p>
        </div>
      </div>

      <div class="panel pro-only" id="panel-compare">
        <div class="field">
          <label for="cm-a">Value A</label>
          <input type="number" id="cm-a" value="80" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label for="cm-b">Value B</label>
          <input type="number" id="cm-b" value="100" step="0.01" inputmode="decimal">

        <p class="hint">Pro: % difference from A → B and B as % of A</p>

    <div class="card result-card">

      <div class="breakdown" id="breakdown">
        <div class="breakdown-item">
          <div class="val" id="bd-1">37.50</div>
          <div class="lbl">Result</div>
        </div>
        <div class="breakdown-item">
          <div class="val" id="bd-2">212.50</div>
          <div class="lbl">Remainder</div>
        </div>
      </div>

      <ol class="compound-steps pro-only" id="compound-list" style="display:none"></ol>

      <div class="actions">

  <div class="toast" id="toast" role="status"></div>

  <script>
    (function () {
      var mode = "percent-of";
      var chDir = "up";
      var rvDir = "up";
      var STORAGE_KEY = "pctcalcpro_last";
      var toastEl = document.getElementById("toast");

      function fmt(n, dec) {
        dec = dec == null ? 2 : dec;
        if (!isFinite(n)) return "—";
        return (+n).toFixed(dec);
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        setTimeout(function () { toastEl.classList.remove("show"); }, 2000);
      }

      function setMode(m) {
        mode = m;
        document.querySelectorAll(".mode-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.mode === m);
        });
        document.querySelectorAll(".panel").forEach(function (p) {
          p.classList.toggle("active", p.id === "panel-" + m);
        });
        calc();
      }

      function setDir(group, dir) {
        if (group === "ch") {
          chDir = dir;
          document.getElementById("ch-up").classList.toggle("active", dir === "up");
          document.getElementById("ch-down").classList.toggle("active", dir === "down");
        } else {
          rvDir = dir;
          document.getElementById("rv-up").classList.toggle("active", dir === "up");
          document.getElementById("rv-down").classList.toggle("active", dir === "down");
        }
        calc();
      }

      function setPresets(row, val) {
        row.querySelectorAll(".preset-btn").forEach(function (btn) {
          btn.classList.toggle("active", +btn.dataset.val === val);
        });
      }

      function parseSteps(text) {
        return text.split(/[\n,;]+/).map(function (s) { return s.trim(); }).filter(Boolean).map(function (s) {
          var n = parseFloat(s.replace(/[%+]/g, ""));
          if (isNaN(n)) return null;
          if (s.indexOf("-") === 0 || s.indexOf("−") === 0) n = -Math.abs(n);
          else if (s.indexOf("+") >= 0) n = Math.abs(n);
          return n;
        }).filter(function (x) { return x != null; });
      }

      function calc() {
        var main = document.getElementById("result-main");
        var sub = document.getElementById("result-sub");
        var bd1 = document.getElementById("bd-1");
        var bd2 = document.getElementById("bd-2");
        var compoundList = document.getElementById("compound-list");
        compoundList.style.display = "none";
        var summary = "";

        if (mode === "percent-of") {
          var pct = +document.getElementById("po-pct").value || 0;
          var of = +document.getElementById("po-of").value || 0;
          var result = of * pct / 100;
          main.textContent = fmt(result);
          sub.innerHTML = "<strong>" + fmt(pct, 1) + "%</strong> of <strong>" + fmt(of) + "</strong> = <strong>" + fmt(result) + "</strong>";
          bd1.textContent = fmt(result);
          bd1.parentElement.querySelector(".lbl").textContent = "Result";
          bd2.textContent = fmt(of - result);
          bd2.parentElement.querySelector(".lbl").textContent = "Remainder";
          summary = fmt(pct, 1) + "% of " + fmt(of) + " = " + fmt(result);
        } else if (mode === "what-percent") {
          var part = +document.getElementById("wp-part").value || 0;
          var whole = Math.max(0.0001, +document.getElementById("wp-whole").value || 1);
          var pctW = part / whole * 100;
          main.textContent = fmt(pctW, 1) + "%";
          sub.innerHTML = "<strong>" + fmt(part) + "</strong> is <strong>" + fmt(pctW, 1) + "%</strong> of <strong>" + fmt(whole) + "</strong>";
          bd1.textContent = fmt(pctW, 1) + "%";
          bd1.parentElement.querySelector(".lbl").textContent = "Percentage";
          bd2.textContent = fmt(whole - part);
          bd2.parentElement.querySelector(".lbl").textContent = "Difference";
          summary = fmt(part) + " is " + fmt(pctW, 1) + "% of " + fmt(whole);
        } else if (mode === "change") {
          var val = +document.getElementById("ch-val").value || 0;
          var chPct = +document.getElementById("ch-pct").value || 0;
          var delta = val * chPct / 100 * (chDir === "up" ? 1 : -1);
          var final = val + delta;
          main.textContent = fmt(final);
          var dirLabel = chDir === "up" ? "increase" : "decrease";
          sub.innerHTML = "<strong>" + fmt(val) + "</strong> " + dirLabel + "d by <strong>" + fmt(chPct, 1) + "%</strong> → <strong>" + fmt(final) + "</strong>";
          bd1.textContent = (delta >= 0 ? "+" : "") + fmt(delta);
          bd1.parentElement.querySelector(".lbl").textContent = "Change";
          bd2.textContent = fmt(final);
          bd2.parentElement.querySelector(".lbl").textContent = "Final";
          summary = fmt(val) + " " + dirLabel + " " + fmt(chPct, 1) + "% = " + fmt(final);
        } else if (mode === "reverse") {
          var rvFinal = +document.getElementById("rv-final").value || 0;
          var rvPct = +document.getElementById("rv-pct").value || 0;
          var factor = rvDir === "up" ? 1 + rvPct / 100 : 1 - rvPct / 100;
          var original = factor !== 0 ? rvFinal / factor : 0;
          main.textContent = fmt(original);
          sub.innerHTML = "Original: <strong>" + fmt(original) + "</strong> before <strong>" + fmt(rvPct, 1) + "%</strong> " + (rvDir === "up" ? "increase" : "decrease") + " → <strong>" + fmt(rvFinal) + "</strong>";
          bd1.textContent = fmt(original);
          bd1.parentElement.querySelector(".lbl").textContent = "Original";
          bd2.textContent = fmt(rvFinal - original);
          bd2.parentElement.querySelector(".lbl").textContent = "Change amt";
          summary = "Original " + fmt(original) + " → " + fmt(rvFinal);
        } else if (mode === "compound") {
          var start = +document.getElementById("cp-start").value || 0;
          var steps = parseSteps(document.getElementById("cp-steps").value);
          var cur = start;
          compoundList.innerHTML = "";
          compoundList.style.display = steps.length ? "block" : "none";
          steps.forEach(function (step, i) {
            var prev = cur;
            cur = cur * (1 + step / 100);
            var li = document.createElement("li");
            li.textContent = "Step " + (i + 1) + ": " + fmt(prev) + " " + (step >= 0 ? "+" : "") + fmt(step, 1) + "% → " + fmt(cur);
            compoundList.appendChild(li);
          });
          var totalPct = start !== 0 ? (cur / start - 1) * 100 : 0;
          main.textContent = fmt(cur);
          sub.innerHTML = "<strong>" + fmt(start) + "</strong> after <strong>" + steps.length + "</strong> steps → <strong>" + fmt(cur) + "</strong> (<strong>" + (totalPct >= 0 ? "+" : "") + fmt(totalPct, 1) + "%</strong> net)";
          bd1.textContent = fmt(cur);
          bd1.parentElement.querySelector(".lbl").textContent = "Final";
          bd2.textContent = (totalPct >= 0 ? "+" : "") + fmt(totalPct, 1) + "%";
          bd2.parentElement.querySelector(".lbl").textContent = "Net change";
          summary = fmt(start) + " → " + fmt(cur) + " (" + steps.length + " steps)";
        } else if (mode === "compare") {
          var a = +document.getElementById("cm-a").value || 0;
          var b = +document.getElementById("cm-b").value || 0;
          var diff = b - a;
          var pctDiff = a !== 0 ? diff / Math.abs(a) * 100 : 0;
          var bOfA = a !== 0 ? b / a * 100 : 0;
          main.textContent = (pctDiff >= 0 ? "+" : "") + fmt(pctDiff, 1) + "%";
          sub.innerHTML = "A=<strong>" + fmt(a) + "</strong> → B=<strong>" + fmt(b) + "</strong> · diff <strong>" + (diff >= 0 ? "+" : "") + fmt(diff) + "</strong>";
          bd1.textContent = fmt(bOfA, 1) + "%";
          bd1.parentElement.querySelector(".lbl").textContent = "B as % of A";
          bd2.textContent = (diff >= 0 ? "+" : "") + fmt(diff);
          bd2.parentElement.querySelector(".lbl").textContent = "Difference";
          summary = fmt(a) + " → " + fmt(b) + " = " + fmt(pctDiff, 1) + "% change";
        }

        try { localStorage.setItem(STORAGE_KEY, summary); } catch (e) {}
      }

      document.querySelectorAll(".mode-btn").forEach(function (btn) {
        btn.addEventListener("click", function () { setMode(btn.dataset.mode); });
      });

      document.querySelectorAll(".preset-row").forEach(function (row) {
        var targetId = row.dataset.target;
        row.querySelectorAll(".preset-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.getElementById(targetId).value = btn.dataset.val;
            setPresets(row, +btn.dataset.val);
            calc();
          });
        });
      });

      ["ch-up", "ch-down", "rv-up", "rv-down"].forEach(function (id) {
        document.getElementById(id).addEventListener("click", function () {
          setDir(id.indexOf("ch") === 0 ? "ch" : "rv", id.indexOf("up") >= 0 ? "up" : "down");
        });
      });

      document.querySelectorAll("input, textarea").forEach(function (el) {
        el.addEventListener("input", calc);
      });

      document.getElementById("reset").addEventListener("click", function () {
        document.getElementById("po-pct").value = "15";
        document.getElementById("po-of").value = "250";
        document.getElementById("wp-part").value = "40";
        document.getElementById("wp-whole").value = "250";
        document.getElementById("ch-val").value = "100";
        document.getElementById("ch-pct").value = "15";
        document.getElementById("rv-final").value = "115";
        document.getElementById("rv-pct").value = "15";
        document.getElementById("cp-start").value = "1000";
        document.getElementById("cp-steps").value = "+10\n-5\n+15";
        document.getElementById("cm-a").value = "80";
        document.getElementById("cm-b").value = "100";
        chDir = "up"; rvDir = "up";
        setDir("ch", "up");
        setDir("rv", "up");
        setMode("percent-of");
        showToast("Reset to defaults");
      });

      document.getElementById("share").addEventListener("click", function () {
        var text = document.getElementById("result-sub").textContent.replace(/\s+/g, " ").trim() + " (Percentage Calculator Pro)";
        if (navigator.share) {
          navigator.share({ title: "Percentage Calculator Pro", text: text }).catch(function () {});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function () { showToast("Copied to clipboard"); });
        } else {
          showToast(text);
        }
      });

      calc();
    })();
  </script>

</div><script>(function(){
  var APP="percentage-calculator-pro";
  var PRODUCTS=[{"key":"pro_unlock","id":"com.wealthengine.percentagecalculatorpro.pro_unlock","price":4.99,"title":"Pro Unlock"}];
  var PREFIX='we_iap_'+APP+'_';

  function owned(key){
    try{return localStorage.getItem(PREFIX+key)==='1'}catch(e){return false}
  }
  function setOwned(key){
    try{localStorage.setItem(PREFIX+key,'1')}catch(e){}
    refreshUI();
  }

  function shouldShowAds(){
    return true;
  }

  function hideAdSlots(){
    if(shouldShowAds())return;
    document.querySelectorAll('.ad,[data-ad-slot]').forEach(function(el){
      el.style.display='none';
    });
  }

  function refreshUI(){
    var badge=document.getElementById('we-iap-premium-badge');
    var removeBtn=document.getElementById('we-iap-remove-ads');
    var hasPremium=owned('premium_unlock')||owned('pro_unlock');
    var noAds=!shouldShowAds();
    if(badge)badge.style.display=(hasPremium||noAds)?'inline-block':'none';
    if(removeBtn)removeBtn.style.display=noAds?'none':'inline-block';
    hideAdSlots();
    document.body.classList.toggle('we-iap-premium',hasPremium);
    document.body.classList.toggle('we-iap-no-ads',noAds);
  }

  function purchase(key){
    var prod=PRODUCTS.find(function(p){return p.key===key});
    if(!prod)return Promise.reject(new Error('Unknown product'));
    if(owned(key))return Promise.resolve({key:key,restored:true});

    /* Native: @revenuecat/purchases-capacitor or StoreKit 2 via Capacitor plugin */
    if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Purchases){
      return window.Capacitor.Plugins.Purchases.purchaseProduct({productIdentifier:prod.id})
        .then(function(){setOwned(key);return{key:key,purchased:true};});
    }

    /* Sandbox / pre-App-Store-Connect: simulate success (replace after products live) */
    if(confirm('Purchase '+prod.title+' (
</html>
+prod.price.toFixed(2)+')?\n\nSandbox mode — receipt verify placeholder until App Store Connect products are live.')){
      setOwned(key);
      return Promise.resolve({key:key,purchased:true,sandbox:true});
    }
    return Promise.reject(new Error('Cancelled'));
  }

  function restore(){
    if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Purchases){
      return window.Capacitor.Plugins.Purchases.restorePurchases().then(function(res){
        (res&&res.customerInfo&&res.customerInfo.entitlements&&res.customerInfo.entitlements.active||{}).forEach(function(){});
        refreshUI();
        return{restored:true};
      });
    }
    refreshUI();
    alert('Restore complete — checked local purchases. Connect RevenueCat for cross-device restore.');
    return Promise.resolve({restored:true,local:true});
  }

  window.WE_IAP={
    app:APP,
    products:PRODUCTS,
    owns:owned,
    shouldShowAds:shouldShowAds,
    purchase:purchase,
    restore:restore,
    refresh:refreshUI
  };

  function wireUI(){
    var bar=document.getElementById('we-iap-bar');
    if(!bar)return;
    var removeBtn=document.getElementById('we-iap-remove-ads');
    var premiumBtn=document.getElementById('we-iap-premium');
    var restoreBtn=document.getElementById('we-iap-restore');
    var tipBtn=document.getElementById('we-iap-tip');
    if(removeBtn)removeBtn.addEventListener('click',function(){WE_IAP.purchase('remove_ads').catch(function(){})});
    if(premiumBtn)premiumBtn.addEventListener('click',function(){
      WE_IAP.purchase('pro_unlock').catch(function(){});
    });
    if(restoreBtn)restoreBtn.addEventListener('click',function(){WE_IAP.restore()});
    if(tipBtn)tipBtn.addEventListener('click',function(){WE_IAP.purchase('tip_jar').catch(function(){})});
    refreshUI();
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wireUI);
  else wireUI();
})();</script></body>
</html>
